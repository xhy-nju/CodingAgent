services:
  coding-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      LLM_MODE: ${LLM_MODE:-mock}
      ENABLE_REAL_LLM: ${ENABLE_REAL_LLM:-false}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://njusehub.info/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-glm-5.2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-before-deploying}
      SESSION_SECRET: ${SESSION_SECRET:-local-session-secret-change-before-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CODING_AGENT_DATA_DIR: /data
    volumes:
      - coding-agent-data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  coding-agent-data:
